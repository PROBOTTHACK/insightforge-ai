services:
  backend:
    build:
      context: ./backend
    environment:
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8000:8000"

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
